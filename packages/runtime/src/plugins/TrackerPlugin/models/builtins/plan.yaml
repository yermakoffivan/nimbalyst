type: plan
displayName: Plan
displayNamePlural: Plans
icon: flag
color: "#3b82f6"

modes:
  inline: true
  fullDocument: true

sync:
  mode: hybrid
  scope: project

idPrefix: pln
idFormat: ulid

fields:
  - name: planId
    type: string
    required: true
    displayInline: false

  - name: title
    type: string
    required: true
    displayInline: true

  - name: status
    type: select
    required: true
    default: draft
    options:
      - value: draft
        label: Draft
        icon: edit_note
        color: "#64748b"
      - value: ready-for-development
        label: Ready
        icon: check_circle
        color: "#22c55e"
      - value: in-development
        label: In Development
        icon: construction
        color: "#f59e0b"
      - value: in-review
        label: In Review
        icon: rate_review
        color: "#3b82f6"
      - value: completed
        label: Completed
        icon: task_alt
        color: "#10b981"
      - value: rejected
        label: Rejected
        icon: cancel
        color: "#ef4444"
      - value: blocked
        label: Blocked
        icon: block
        color: "#dc2626"

  - name: planType
    type: select
    required: false
    default: feature
    options:
      - value: system-design
        label: System Design
      - value: feature
        label: Feature
      - value: bug-fix
        label: Bug Fix
      - value: refactor
        label: Refactor
      - value: documentation
        label: Documentation
      - value: research
        label: Research

  - name: priority
    type: select
    required: false
    options:
      - value: low
        label: Low
        icon: arrow_downward
      - value: medium
        label: Medium
        icon: remove
      - value: high
        label: High
        icon: arrow_upward
      - value: critical
        label: Critical
        icon: priority_high

  - name: progress
    type: number
    min: 0
    max: 100
    displayInline: false

  - name: owner
    type: user
    displayInline: true

  - name: stakeholders
    type: array
    itemType: string
    displayInline: false

  - name: tags
    type: array
    itemType: string
    displayInline: false

  - name: created
    type: datetime
    displayInline: false
    readOnly: true

  - name: updated
    type: datetime
    displayInline: false
    readOnly: true

  - name: startDate
    type: date
    displayInline: false

  - name: agentSessions
    type: array
    itemType: object
    displayInline: false

statusBarLayout:
  - row:
    - field: status
      width: 200
    - field: priority
      width: 150
    - field: progress
      width: 100
  - row:
    - field: owner
      width: 200
    - field: tags
      width: auto

inlineTemplate: "{icon} {title} {status} {priority}"

roles:
  title: title
  workflowStatus: status
  priority: priority
  assignee: owner
  tags: tags
  progress: progress
  startDate: startDate

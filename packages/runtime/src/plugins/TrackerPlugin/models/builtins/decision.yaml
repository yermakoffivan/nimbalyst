type: decision
displayName: Decision
displayNamePlural: Decisions
icon: gavel
color: "#8b5cf6"

modes:
  inline: true
  fullDocument: true

sync:
  mode: shared
  scope: project

idPrefix: dec
idFormat: ulid

fields:
  - name: decisionId
    type: string
    required: true
    displayInline: false

  - name: title
    type: string
    required: true
    displayInline: true

  - name: status
    type: select
    default: to-do
    options:
      - value: to-do
        label: To Decide
        icon: help
      - value: in-progress
        label: Evaluating
        icon: psychology
      - value: decided
        label: Decided
        icon: check_circle
      - value: implemented
        label: Implemented
        icon: done_all

  - name: chosen
    type: string
    displayInline: true

  - name: priority
    type: select
    required: false
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
      - value: critical
        label: Critical

  - name: owner
    type: user
    displayInline: false

  - name: stakeholders
    type: array
    itemType: string
    displayInline: false

  - name: tags
    type: array
    itemType: string
    displayInline: false

  - name: created
    type: datetime
    displayInline: false
    readOnly: true

  - name: updated
    type: datetime
    displayInline: false
    readOnly: true

statusBarLayout:
  - row:
    - field: status
      width: 200
    - field: chosen
      width: 300
    - field: priority
      width: 150

inlineTemplate: "{icon} {title} {status}"

roles:
  title: title
  workflowStatus: status
  priority: priority
  assignee: owner
  tags: tags

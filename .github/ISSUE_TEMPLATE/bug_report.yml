name: Bug report
description: Something isn't working in Nimbalyst
title: "[Bug]: "
type: Bug
labels: ["status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below so we can reproduce and fix it.
        For usage questions, please use [Discussions → Q&A](https://github.com/Nimbalyst/nimbalyst/discussions/categories/q-a) instead.
  - type: textarea
    id: problem
    attributes:
      label: Describe the bug
      description: "Put everything in one place: what happened, what you expected, how to reproduce it, and any logs or screenshots."
      placeholder: |
        What happened:
        The app crashed when I ...

        What I expected:
        I expected ...

        Steps to reproduce:
        1. Open ...
        2. Click ...
        3. See error

        Logs / screenshots:
        Paste logs here or attach screenshots below.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nimbalyst version
      placeholder: e.g. 0.58.3
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Other
